name: Build XRTL Terminal

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install npm dependencies
      run: npm install

    - name: Build application
      run: npm run build

    - name: Package for Windows (portable exe)
      env:
        GH_TOKEN: "dummy-token"
      run: npm run dist -- --windows portable

    - name: Package for Windows (installer)
      env:
        GH_TOKEN: "dummy-token"
      run: npm run dist -- --windows nsis

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: xrtl-terminal-builds
        path: |
          dist/*.exe
          dist/*.zip
          dist/*.nsis-installer.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: xrtl-terminal-builds
        path: dist/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*.exe
          dist/*.zip
          dist/*.nsis-installer.exe
        generate_release_notes: true